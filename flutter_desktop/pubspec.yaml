name: rgs_sensor_panel_flutter
description: Flutter Windows UI for RGS Sensor Panel.
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.29.0
  screen_retriever: ^0.2.2
  tray_manager: ^0.5.3
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/rgs-logo.ico
    - assets/support_me_on_kofi_beige.png
